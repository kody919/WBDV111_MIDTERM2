<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="vibeprocss.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand">
                <div class="logo-icon">👨🏻‍🚒</div>
                <h1>Zitow<span>Music</span></h1>
                <p>Log in now!</p>
            </div>

            <form action="home.html" method="GET">
                <div class="input-group">
                    <input type="email" id="email" required placeholder=" ">
                    <label for="email">Email Address</label>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" required placeholder=" ">
                    <label for="password">Password</label>
                </div>
                
                <a href="home.html" class="input-group"> <button type="submit" class="login-btn">Log In</button></a>
                
                <div class="footer-links">
                    <a href="reset.html">Forgot Password?</a>
                    <div class="divider"></div>
                    <span>New here? <a href="signup.html" class="signup">Join Us Now!</a></span>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
